<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration — Lab Accounts</title>
  <meta name="description" content="Register a new student account for Lab Accounts." />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent-2); }

    .auth-card { max-width: 480px; }

    .reg-success {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
      animation: fadeUp 0.4s ease;
    }
    .reg-success .success-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }
    .reg-success h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.4rem; }
    .reg-success p { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1.5rem; }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }
    .strength-label {
      font-size: 0.7rem;
      margin-top: 0.25rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body class="auth-page">
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-card">
    <a href="login.html" class="back-link">← Back to Login</a>

    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <h1>Student Registration</h1>
      <p>Create your Lab Accounts profile</p>
    </div>

    <!-- ── Registration Form ────────────────── -->
    <form id="reg-form" onsubmit="handleRegister(event)">

      <!-- Name -->
      <div class="form-group">
        <label for="name">Full Name <span style="color:var(--danger)">*</span></label>
        <input
          id="name" name="name"
          class="form-control"
          type="text"
          placeholder="e.g. Anfaz Ahamed"
          required
          autocomplete="name"
        />
      </div>

      <!-- Student ID -->
      <div class="form-group">
        <label for="studentId">Student ID <span style="color:var(--danger)">*</span></label>
        <input
          id="studentId" name="studentId"
          class="form-control"
          type="text"
          placeholder="e.g. 2024CS001"
          required
        />
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:0.3rem">
          This will be your login ID. Choose it carefully.
        </div>
      </div>

      <!-- Batch -->
      <div class="form-group">
        <label for="batch">Batch <span style="color:var(--danger)">*</span></label>
        <input
          id="batch" name="batch"
          class="form-control"
          list="batch-list"
          placeholder="Select or type your batch..."
          required
        />
        <datalist id="batch-list">
          <option value="HS1"></option>
          <option value="HS2"></option>
          <option value="BS1"></option>
          <option value="BS2"></option>
          <option value="BS3"></option>
          <option value="BS4"></option>
          <option value="BS5"></option>
        </datalist>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone <span style="color:var(--danger)">*</span></label>
        <input
          id="phone" name="phone"
          class="form-control"
          type="tel"
          placeholder="e.g. +91 9876543210"
          required
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password <span style="color:var(--danger)">*</span></label>
        <div class="password-wrapper">
          <input
            id="password" name="password"
            class="form-control"
            type="password"
            placeholder="Create a strong password"
            required
            minlength="6"
            oninput="checkStrength(this.value)"
          />
          <button type="button" class="eye-btn" onclick="toggleEye('password','eye-reg1')" id="eye-reg1" title="Show/Hide">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm-password">Confirm Password <span style="color:var(--danger)">*</span></label>
        <div class="password-wrapper">
          <input
            id="confirm-password" name="confirmPassword"
            class="form-control"
            type="password"
            placeholder="Re-enter your password"
            required
          />
          <button type="button" class="eye-btn" onclick="toggleEye('confirm-password','eye-reg2')" id="eye-reg2" title="Show/Hide">👁️</button>
        </div>
      </div>

      <div id="reg-alert"></div>

      <button id="reg-btn" class="btn btn-primary btn-full" type="submit">
        <span id="reg-btn-text">✅ Create Account</span>
      </button>
    </form>

    <!-- ── Success State ────────────────────── -->
    <div class="reg-success" id="reg-success">
      <div class="success-icon">🎉</div>
      <h2>Registration Successful!</h2>
      <p id="success-msg">Your account has been created. You can now log in using your Student ID and password.</p>
      <a href="login.html" class="btn btn-primary btn-full">Go to Login →</a>
    </div>

    <p style="text-align:center;font-size:0.72rem;color:var(--text-muted);margin-top:1.5rem">
      Already registered? <a href="login.html" style="color:var(--accent-2);text-decoration:none">Sign In</a>
    </p>
  </div>

  <script type="module">
    import { seedDefaults, createStudent, getCurrentUser } from './js/storage.service.js';

    // ── Eye toggle ──────────────────────────────────────
    window.toggleEye = function(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁️';
    };

    seedDefaults();

    // Redirect if already logged in as student or student_id is set
    const savedStudentId = localStorage.getItem('student_id');
    const user = getCurrentUser();
    if (savedStudentId || (user && user.role === 'student')) {
      window.location.href = 'student.html';
    }

    // ── Password strength meter ────────────────
    window.checkStrength = function(val) {
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '0%',   color: '',                    text: '' },
        { pct: '25%',  color: 'var(--danger)',        text: '🔴 Weak' },
        { pct: '50%',  color: 'var(--warning)',       text: '🟡 Fair' },
        { pct: '75%',  color: 'var(--info)',          text: '🔵 Good' },
        { pct: '90%',  color: 'var(--success)',       text: '🟢 Strong' },
        { pct: '100%', color: 'var(--accent-2)',      text: '✨ Very Strong' },
      ];
      const lvl = levels[Math.min(score, 5)];
      fill.style.width      = lvl.pct;
      fill.style.background = lvl.color;
      label.textContent     = lvl.text;
    };

    // ── Register handler ───────────────────────
    window.handleRegister = async function(e) {
      e.preventDefault();
      const form      = e.target;
      const alertEl   = document.getElementById('reg-alert');
      const btn       = document.getElementById('reg-btn');
      const btnText   = document.getElementById('reg-btn-text');

      alertEl.innerHTML = '';

      const name            = form.name.value.trim();
      const studentId       = form.studentId.value.trim();
      const batch           = form.batch.value;
      const phone           = form.phone.value.trim();
      const password        = form.password.value;
      const confirmPassword = form.confirmPassword.value;

      // Client-side validation
      if (!name) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ Please enter your full name.</div>`;
        return;
      }
      if (!studentId) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ Please enter your Student ID.</div>`;
        return;
      }
      if (!batch) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ Please select your batch.</div>`;
        return;
      }
      if (!phone) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ Please enter your phone number.</div>`;
        return;
      }
      if (password.length < 6) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ Password must be at least 6 characters.</div>`;
        return;
      }
      if (password !== confirmPassword) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ Passwords do not match.</div>`;
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Creating account…';

      const { data, error } = await createStudent({
        name,
        studentId,
        batch,
        phone,
        password,
      });

      if (error) {
        alertEl.innerHTML = `<div class="alert alert-error">⚠️ ${error}</div>`;
        btn.disabled = false;
        btnText.textContent = '✅ Create Account';
        return;
      }

      // Save student_id to localStorage for auto sign-in and redirect
      localStorage.setItem('student_id', data.studentId);
      
      btnText.textContent = 'Redirecting…';
      window.location.href = 'student.html';
    };
  </script>
</body>
</html>
